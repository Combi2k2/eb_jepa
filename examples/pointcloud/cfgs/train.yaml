# PointCloud SSL pretraining config (ModelNet40, view-invariant VICReg).
meta:
  seed: 0
  ckpt_dir: checkpoints/pointcloud/ssl_pointnet
data:
  data_root: /lustre/work/pdl17890/udl806719/datasets/modelnet40/modelnet40_ply_hdf5_2048
  n_points: 1024
  n_classes: 40
  batch_size: 128
  num_workers: 8
  rotate: so3            # so3 (full view-invariance) | z (azimuth only) | none
  jitter: 0.01
  scale_lo: 0.8
  scale_hi: 1.25
model:
  backbone: pointnet      # pointnet | pointnet2
  in_channels: 3        # (x, y, z)
  out_dim: 1024         # PointNet global feature dim D
  feature_transform: true # PointNet only
  projector: 1024-2048-2048
  std_coeff: 25.0
  cov_coeff: 1.0
  transform_reg_weight: 1.0e-3
optim:
  epochs: 60
  lr: 1.0e-3
  weight_decay: 1.0e-6

meta:
  seed: 0
  output_dir: checkpoints/pointcloud/eb_jepa_action_predictor

data:
  data_root: /lustre/work/pdl17890/udl806719/datasets/modelnet40/modelnet40_ply_hdf5_2048
  n_points: 1024
  n_classes: 40
  batch_size: 128
  num_workers: 8

sweep:
  supervised_ratios: [0.10, 0.25, 0.50, 0.75]
  val_ratio: 0.20
  split_seed: 0

model:
  backbone: simple
  in_channels: 3
  out_dim: 1024
  transform_reg_weight: 0.0

action_jepa:
  rotation_action: so3
  action_hidden: 128
  predictor_hidden: 2048
  prediction_coeff: 25.0
  std_coeff: 10.0
  cov_coeff: 1.0
  ema_momentum: 0.996

optim:
  ssl_epochs: 60
  supervised_epochs: 100
  probe_epochs: 100
  finetune_epochs: 100
  ssl_lr: 1.0e-3
  supervised_lr: 1.0e-3
  probe_lr: 1.0e-3
  finetune_variants:
    equal_lr:
      encoder_lr: 1.0e-3
      head_lr: 1.0e-3
    split_lr:
      encoder_lr: 1.0e-4
      head_lr: 1.0e-3
  weight_decay: 1.0e-6

logging:
  enabled: true
  project: eb_jepa_action_predictor
  group: rotation-as-action-ratio-sweep

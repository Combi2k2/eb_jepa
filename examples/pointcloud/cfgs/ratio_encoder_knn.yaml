meta:
  seed: 0
  checkpoint_root: checkpoints/pointcloud/eb_jepa_vicreg_tuned_ratio_matched
  output_dir: checkpoints/pointcloud/eb_jepa_ratio_encoder_knn

data:
  data_root: /lustre/work/pdl17890/udl806719/datasets/modelnet40/modelnet40_ply_hdf5_2048
  n_points: 1024
  n_classes: 40
  batch_size: 128
  num_workers: 8
  jitter: 0.01
  scale_lo: 0.8
  scale_hi: 1.25

sweep:
  supervised_ratios: [0.10, 0.25, 0.50, 0.75]
  val_ratio: 0.20
  split_seed: 0
  augmentations: [none, z, so3]
  ssl_augmentation: so3
  supervised_rotation_only: true
  test_matches_supervised: true

model:
  backbone: simple
  in_channels: 3
  out_dim: 1024

knn:
  neighbors: 5
  metric: cosine
  weights: distance
  projection: pca

logging:
  enabled: true
  knn_project: eb_jepa_ratio_encoder_knn
  knn_group: all40-disjoint-ratio-matched-augmentation

meta:
  seed: 0
  output_dir: checkpoints/pointcloud/eb_jepa_new_class_10_30
  existing_20_dir: checkpoints/pointcloud/eb_jepa_new_class

data:
  data_root: /lustre/work/pdl17890/udl806719/datasets/modelnet40/modelnet40_ply_hdf5_2048
  total_classes: 40
  n_classes: 30
  n_points: 1024
  batch_size: 128
  num_workers: 8
  jitter: 0.01
  scale_lo: 0.8
  scale_hi: 1.25

split:
  n_pretrain_classes: 10
  class_seed: 0
  sample_seed: 0
  val_ratio: 0.20

sweep:
  new_pretrain_class_counts: [10, 30]
  rotation_pretrain_class_counts: [10, 20, 30]
  pretrain_class_counts: [10, 20, 30]
  rotation_seed: 0

model:
  backbone: simple
  in_channels: 3
  out_dim: 1024
  transform_reg_weight: 0.0
  projector: 1024-2048-2048
  std_coeff: 25.0
  cov_coeff: 1.0

optim:
  ssl_epochs: 60
  supervised_epochs: 100
  probe_epochs: 100
  finetune_epochs: 100
  ssl_lr: 1.0e-3
  supervised_lr: 1.0e-3
  probe_lr: 1.0e-3
  finetune_variants:
    equal_lr:
      encoder_lr: 1.0e-3
      head_lr: 1.0e-3
    split_lr:
      encoder_lr: 1.0e-4
      head_lr: 1.0e-3
  weight_decay: 1.0e-6

knn:
  neighbors: 5
  metric: cosine
  weights: distance
  projection: pca

logging:
  enabled: true
  project: eb_jepa_new_class_10_30
  group: pointcloud-disjoint-class-clean
  rotation_project: eb_jepa_new_class_rotation_test
  rotation_group: pointcloud-disjoint-class-rotation-test
  matched_rotation_project: eb_jepa_new_class_matched_rotation
  matched_rotation_group: pointcloud-disjoint-class-matched-rotation
  knn_project: eb_jepa_encoder_knn
  knn_group: pointcloud-disjoint-class-encoder-knn

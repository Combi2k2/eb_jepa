meta:
  seed: 0
  output_dir: checkpoints/pointcloud/ratio_sweep

data:
  data_root: /lustre/work/pdl17890/udl806719/datasets/modelnet40/modelnet40_ply_hdf5_2048
  n_points: 1024
  n_classes: 40
  batch_size: 128
  num_workers: 8
  jitter: 0.01
  scale_lo: 0.8
  scale_hi: 1.25

sweep:
  # Fraction of the official training split allocated to supervised train+val.
  # The disjoint complement is used for VICReg pretraining.
  supervised_ratios: [0.10, 0.25, 0.50, 0.75]
  val_ratio: 0.20
  split_seed: 0
  augmentations: [none, z, so3]
  argument_test_augmentations: [none, z, so3]

model:
  in_channels: 3
  out_dim: 1024
  projector: 1024-2048-2048
  std_coeff: 25.0
  cov_coeff: 1.0

optim:
  ssl_epochs: 60
  supervised_epochs: 100
  probe_epochs: 100
  finetune_epochs: 100
  ssl_lr: 1.0e-3
  supervised_lr: 1.0e-3
  probe_lr: 1.0e-3
  finetune_variants:
    equal_lr:
      encoder_lr: 1.0e-3
      head_lr: 1.0e-3
    split_lr:
      encoder_lr: 1.0e-4
      head_lr: 1.0e-3
  weight_decay: 1.0e-6

logging:
  enabled: true
  project: eb_jepa
  group: pointcloud-ratio-sweep
